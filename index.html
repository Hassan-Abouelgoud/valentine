<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Me! ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #fff0f3 0%, #ffdee9 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Prevents scrolling when button moves */
        }

        #card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(255, 75, 110, 0.3);
            text-align: center;
            max-width: 450px;
            width: 85%;
            z-index: 10;
        }

        h1 { color: #ff4b6e; font-size: 28px; }
        p { color: #444; font-size: 18px; margin-bottom: 30px; }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100px;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4b6e;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 75, 110, 0.4);
        }

        #noBtn {
            background-color: #acacac;
            color: white;
            position: absolute; /* Needed for the "run away" logic */
            transition: all 0.1s ease;
            z-index: 999;
        }

        .hidden { display: none; }

        .success-msg {
            color: #ff4b6e;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="card">
        <div id="questionSection">
            <div style="font-size: 60px; margin-bottom: 10px;">🌹</div>
            <h1>Will you be my Valentine?</h1>
            <p>Don't even think about saying no...</p>
            
            <div class="btn-container">
                <button id="yesBtn" onclick="celebrate()">YES!</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>

        <div id="celebration" class="hidden">
            <div style="font-size: 60px;">🥰</div>
            <h1 class="success-msg">Yay! Best Choice Ever!</h1>
            <p>I knew you'd say yes (eventually). I love you! ❤️</p>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Calculate a random position anywhere on the screen
            // Subtracting button size so it doesn't go off-edge
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed'; // Make it jump relative to the whole screen
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            // Hide the question and the elusive "No" button
            document.getElementById('questionSection').classList.add('hidden');
            document.getElementById('noBtn').classList.add('hidden');
            
            // Show the success screen
            document.getElementById('celebration').classList.remove('hidden');

            // Trigger fancy heart-colored confetti
            var count = 200;
            var defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
              confetti(Object.assign({}, defaults, opts, {
                particleCount: Math.floor(count * particleRatio)
              }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    </script>
</body>
</html>
